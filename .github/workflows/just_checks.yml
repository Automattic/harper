name: Just Checks

on:
  push:
    branches: ["master", "web-prod"]
  pull_request:
    branches: ["master"]
  merge_group:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  just-checks:
    runs-on: ubuntu-latest
    name: just ${{ matrix.task }}
    strategy:
      matrix:
        task:
          [
            check-rust,
            check-js,
            test-rust,
            test-harperjs,
            test-vscode,
            test-chrome-plugin,
            test-firefox-plugin,
            test-obsidian,
            check-desktop,
          ]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: rustfmt,clippy
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - name: Enable Corepack
        run: corepack enable
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev
          sudo apt-get install -y libappindicator3-dev || true
      - name: Rust Cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
      - uses: cargo-bins/cargo-binstall@f8810ffa11196f23afb38e6fb64716fbf814ad8f # main
      - name: Install `wasm-pack`
        run: cargo binstall wasm-pack --force --no-confirm
      - name: Install `cargo hack`
        run: cargo binstall cargo-hack --force --no-confirm
      - name: Install `tauri-cli`
        run: cargo binstall tauri-cli --force --no-confirm
      - name: Run `${{ matrix.task }}`
        run: just ${{ matrix.task }}
