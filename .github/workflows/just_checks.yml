name: Just Checks

on:
  push:
    branches: ["master", "web-prod"]
  pull_request:
    branches: ["master"]
  merge_group:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  just-checks:
    runs-on: ubuntu-latest
    name: just ${{ matrix.task }}
    timeout-minutes: 120
    env:
      DISABLE_WASM_OPT: 1
    strategy:
      matrix:
        task:
          [
            check-rust,
            check-js,
            test-rust,
            test-harperjs,
            test-vscode,
            test-chrome-plugin,
            test-firefox-plugin,
            test-obsidian,
            check-desktop,
          ]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          components: rustfmt,clippy
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - name: Enable Corepack
        run: corepack enable
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev
          sudo apt-get install -y libappindicator3-dev || true
      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Give each matrix task its own cache. Without this, every job
          # shares one cache key and all but one rebuild from scratch.
          key: ${{ matrix.task }}
      - uses: cargo-bins/cargo-binstall@910d9e4456ce4b039662d2a02a34ef1d23c3c50c # main
      - name: Install `wasm-pack`
        run: cargo binstall wasm-pack --force --no-confirm
      - name: Install `cargo hack`
        run: cargo binstall cargo-hack --force --no-confirm
      - name: Install `tauri-cli`
        run: cargo binstall tauri-cli --force --no-confirm
      - name: Run `${{ matrix.task }}`
        run: just ${{ matrix.task }}
